[build]
  publish = "."
  command = "npm run build"

# Admin pages — must come BEFORE the catch-all
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin-orders"
  to = "/admin-orders.html"
  status = 200

[[redirects]]
  from = "/table"
  to = "/table.html"
  status = 200

# Catch-all SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

