<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Orders Dashboard | Cafe Coffee Delight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0f;
            --card: #13131a;
            --card2: #1c1c28;
            --border: rgba(255,255,255,0.07);
            --text: #f0f0f5;
            --muted: #888;
            --primary: #d32f2f;
            --primary-glow: rgba(211,47,47,0.25);
            --green: #22c55e;
            --orange: #f59e0b;
            --yellow: #eab308;
            --blue: #3b82f6;
            --radius: 14px;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .dash-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .dash-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.05rem;
        }
        .dash-logo img {
            width: 32px; height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
        }
        .dash-badge {
            background: var(--primary);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .dash-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .dash-back:hover { color: var(--text); }
        .dash-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dash-refresh-btn {
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 7px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .dash-refresh-btn:hover { background: var(--card); border-color: var(--primary); }
        .live-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 0 rgba(34,197,94,0.4);
            animation: pulse-live 2s infinite;
            display: inline-block;
        }
        @keyframes pulse-live {
            0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
            70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
            100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
        }

        /* ===== MAIN LAYOUT ===== */
        .dash-body {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px 80px;
        }

        /* ===== STATS ROW ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }
        @media (max-width: 700px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--accent-color, var(--primary));
            border-radius: var(--radius) var(--radius) 0 0;
        }
        .stat-label {
            font-size: 0.72rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }
        .stat-sub {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-bar h2 {
            font-size: 1rem;
            font-weight: 700;
            flex: 1;
        }
        .filter-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.18s;
        }
        .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        /* ===== ORDER CARDS ===== */
        #ordersContainer {
            display: grid;
            gap: 14px;
        }
        .order-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 16px;
            align-items: start;
            transition: border-color 0.2s;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .order-card:hover { border-color: rgba(255,255,255,0.14); }
        .order-card.status-pending { border-left: 3px solid var(--yellow); }
        .order-card.status-preparing { border-left: 3px solid var(--orange); }
        .order-card.status-ready { border-left: 3px solid var(--blue); }
        .order-card.status-served { border-left: 3px solid var(--green); }

        .order-num {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: var(--card2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .order-main {}
        .order-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .order-table {
            font-weight: 800;
            font-size: 0.95rem;
        }
        .order-customer {
            color: var(--muted);
            font-size: 0.8rem;
        }
        .status-badge {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-badge.pending { background: rgba(234,179,8,0.15); color: var(--yellow); }
        .status-badge.preparing { background: rgba(245,158,11,0.15); color: var(--orange); }
        .status-badge.ready { background: rgba(59,130,246,0.15); color: var(--blue); }
        .status-badge.served { background: rgba(34,197,94,0.15); color: var(--green); }

        .order-items-list {
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.7;
        }
        .order-items-list span {
            display: inline-block;
            background: var(--card2);
            border-radius: 6px;
            padding: 1px 8px;
            margin: 2px 3px 2px 0;
            color: var(--text);
            font-size: 0.75rem;
        }
        .order-meta {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 8px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .order-total {
            font-weight: 800;
            color: var(--text);
            font-size: 0.9rem;
        }
        .order-time { color: var(--muted); }
        .order-notes {
            font-size: 0.75rem;
            color: var(--orange);
            margin-top: 4px;
        }

        .order-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }
        .action-btn {
            font-family: inherit;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.18s;
        }
        .action-btn.btn-prepare {
            background: rgba(245,158,11,0.12);
            border-color: rgba(245,158,11,0.3);
            color: var(--orange);
        }
        .action-btn.btn-prepare:hover { background: rgba(245,158,11,0.22); }
        .action-btn.btn-ready {
            background: rgba(59,130,246,0.12);
            border-color: rgba(59,130,246,0.3);
            color: var(--blue);
        }
        .action-btn.btn-ready:hover { background: rgba(59,130,246,0.22); }
        .action-btn.btn-serve {
            background: rgba(34,197,94,0.12);
            border-color: rgba(34,197,94,0.3);
            color: var(--green);
        }
        .action-btn.btn-serve:hover { background: rgba(34,197,94,0.22); }
        .action-btn.btn-done {
            background: var(--card2);
            border-color: var(--border);
            color: var(--muted);
            cursor: default;
        }

        /* ===== EMPTY / LOADING ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-state p { font-size: 0.9rem; }
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.84rem;
            font-weight: 500;
            animation: toastIn 0.25s ease;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="dash-header">
        <div class="dash-logo">
            <img src="assets/logo.jpeg" alt="Logo">
            <span>Cafe Coffee Delight</span>
            <span class="dash-badge">Orders</span>
        </div>
        <div class="dash-actions">
            <span class="live-dot" title="Live updates active"></span>
            <button class="dash-refresh-btn" onclick="loadOrders()">↻ Refresh</button>
            <a href="admin.html" class="dash-back">← Admin Panel</a>
        </div>
    </header>

    <div class="dash-body">

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card" style="--accent-color:#eab308">
                <div class="stat-label">Pending</div>
                <div class="stat-value" id="statPending">—</div>
                <div class="stat-sub">Awaiting prep</div>
            </div>
            <div class="stat-card" style="--accent-color:#f59e0b">
                <div class="stat-label">Preparing</div>
                <div class="stat-value" id="statPreparing">—</div>
                <div class="stat-sub">In kitchen</div>
            </div>
            <div class="stat-card" style="--accent-color:#22c55e">
                <div class="stat-label">Served Today</div>
                <div class="stat-value" id="statServed">—</div>
                <div class="stat-sub">Completed</div>
            </div>
            <div class="stat-card" style="--accent-color:#d32f2f">
                <div class="stat-label">Revenue Today</div>
                <div class="stat-value" id="statRevenue">—</div>
                <div class="stat-sub">Total billed</div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <h2>📋 Live Orders</h2>
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="preparing">Preparing</button>
            <button class="filter-btn" data-filter="ready">Ready</button>
            <button class="filter-btn" data-filter="served">Served</button>
        </div>

        <!-- Orders List -->
        <div id="ordersContainer">
            <div class="loading-spinner">⏳ Loading orders...</div>
        </div>

    </div>

    <div class="toast-container" id="toastBox"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        let allOrders = [];
        let activeFilter = 'all';

        function showToast(msg) {
            const box = document.getElementById('toastBox');
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            box.appendChild(t);
            setTimeout(() => t.remove(), 2800);
        }

        function timeAgo(dateStr) {
            const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
            if (diff < 60) return `${diff}s ago`;
            if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
            return new Date(dateStr).toLocaleDateString('en-IN', { day:'numeric', month:'short' });
        }

        function isToday(dateStr) {
            const d = new Date(dateStr);
            const now = new Date();
            return d.getDate() === now.getDate() &&
                   d.getMonth() === now.getMonth() &&
                   d.getFullYear() === now.getFullYear();
        }

        function updateStats(orders) {
            const pending = orders.filter(o => o.status === 'pending').length;
            const preparing = orders.filter(o => o.status === 'preparing').length;
            const served = orders.filter(o => o.status === 'served' && isToday(o.created_at)).length;
            const revenue = orders
                .filter(o => isToday(o.created_at) && o.status === 'served')
                .reduce((sum, o) => sum + (o.total || 0), 0);

            document.getElementById('statPending').textContent = pending;
            document.getElementById('statPreparing').textContent = preparing;
            document.getElementById('statServed').textContent = served;
            document.getElementById('statRevenue').textContent = '₹' + revenue;
        }

        function getNextAction(status) {
            const map = {
                'pending':   { label: '🍳 Start Preparing', cls: 'btn-prepare', next: 'preparing' },
                'preparing': { label: '✅ Mark Ready',      cls: 'btn-ready',   next: 'ready' },
                'ready':     { label: '🍽️ Served',         cls: 'btn-serve',   next: 'served' },
                'served':    { label: '✓ Completed',        cls: 'btn-done',    next: null }
            };
            return map[status] || map['pending'];
        }

        function buildOrderCard(order) {
            const action = getNextAction(order.status);
            const items = (order.items || []);
            const itemPills = items.map(i => `<span>${i.qty}× ${i.name}</span>`).join('');
            const statusEmoji = { pending:'🕐', preparing:'🍳', ready:'✅', served:'🎉' };
            const card = document.createElement('div');
            card.className = `order-card status-${order.status}`;
            card.dataset.id = order.id;
            card.innerHTML = `
                <div class="order-num">${statusEmoji[order.status] || '📋'}</div>
                <div class="order-main">
                    <div class="order-top">
                        <span class="order-table">${order.table_number ? 'Table #' + order.table_number : '🚶 Walk-in'}</span>
                        <span class="order-customer">${order.customer_name || 'Guest'}${order.customer_phone ? ' · 📞 ' + order.customer_phone : ''}</span>
                        <span class="status-badge ${order.status}">${order.status}</span>
                    </div>
                    <div class="order-items-list">${itemPills || '<span>No items</span>'}</div>
                    <div class="order-meta">
                        <span class="order-total">₹${order.total || 0}</span>
                        <span class="order-time">⏱ ${timeAgo(order.created_at)}</span>
                        ${order.notes ? `<span style="color:var(--orange)">📝 ${order.notes}</span>` : ''}
                    </div>
                </div>
                <div class="order-actions">
                    <button class="action-btn ${action.cls}" 
                        ${action.next ? `onclick="updateStatus('${order.id}', '${action.next}', this)"` : 'disabled'}
                    >${action.label}</button>
                </div>
            `;
            return card;
        }

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            const filtered = activeFilter === 'all'
                ? allOrders
                : allOrders.filter(o => o.status === activeFilter);

            if (!filtered.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>No ${activeFilter === 'all' ? '' : activeFilter + ' '}orders yet</p>
                    </div>`;
                return;
            }
            container.innerHTML = '';
            filtered.forEach(order => container.appendChild(buildOrderCard(order)));
        }

        async function updateStatus(id, newStatus, btn) {
            btn.disabled = true;
            btn.textContent = '...';
            const ok = await sbUpdateOrderStatus(id, newStatus);
            if (ok) {
                showToast(`Order marked as ${newStatus}`);
                await loadOrders();
            } else {
                showToast('❌ Update failed');
                btn.disabled = false;
            }
        }

        async function loadOrders() {
            allOrders = await sbGetOrders();
            updateStats(allOrders);
            renderOrders();
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.dataset.filter;
                renderOrders();
            });
        });

        // Real-time order updates
        sbSubscribeOrderChanges(async () => {
            await loadOrders();
        });

        // Initial load
        loadOrders();
    </script>
</body>
</html>
